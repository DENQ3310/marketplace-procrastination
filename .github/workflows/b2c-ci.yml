name: b2c-ci

on:
  push:
    paths:
      - ".github/workflows/b2c-ci.yml"
      - "services/b2c/**"

jobs:
  lint:
    name: "B2C: Lint"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/b2c
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: |
            services/b2c/uv.lock
            services/b2c/pyproject.toml

      - name: Create .env from secret
        env:
          B2C_ENV_FILE: ${{ secrets.B2C_ENV_FILE }}
        run: |
          if [ -n "$B2C_ENV_FILE" ]; then
            printf '%s' "$B2C_ENV_FILE" > .env
          else
            cp .env.example .env
          fi

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Lint
        run: make check

  test:
    name: "B2C: Tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/b2c
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          allow-prereleases: true

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: |
            services/b2c/uv.lock
            services/b2c/pyproject.toml

      - name: Create .env from secret
        env:
          B2C_ENV_FILE: ${{ secrets.B2C_ENV_FILE }}
        run: |
          if [ -n "$B2C_ENV_FILE" ]; then
            printf '%s' "$B2C_ENV_FILE" > .env
          else
            cp .env.example .env
          fi

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Test
        run: make test
